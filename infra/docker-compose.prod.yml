services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/trustledger
      DATABASE_USERNAME: trustledger
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      - postgres
      - redpanda
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
    restart: unless-stopped

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: trustledger
      POSTGRES_USER: trustledger
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql   # postgres:18+ stores data in a version subdir under this mount
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.2.1
    command: ["redpanda", "start", "--overprovisioned", "--smp", "1", "--memory", "1G", "--reserve-memory", "0M", "--node-id", "0", "--check=false", "--kafka-addr", "PLAINTEXT://0.0.0.0:9092", "--advertise-kafka-addr", "PLAINTEXT://redpanda:9092"]
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
