apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: trustledger
resources:
  - ../../base
# Prod tuning: more backend replicas + pinned image tags come from CD (set image).
patches:
  - target:
      kind: Deployment
      name: trustledger-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
images:
  - name: ghcr.io/thepluscode/trustledger-backend
    newTag: "2.9.0"
  - name: ghcr.io/thepluscode/trustledger-frontend
    newTag: "2.9.0"
