# TrustLedger Helm values. Override per environment (values-staging.yaml / values-prod.yaml).

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io/thepluscode
  pullPolicy: IfNotPresent

backend:
  image:
    repository: trustledger-backend
    tag: "2.9.0"
  replicaCount: 3
  containerPort: 8080
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  # Probes use the actuator endpoints enabled in v2.5.
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
  # Non-secret config (secrets come from the Secret below / external secret manager).
  env:
    PRODUCTION_MODE: "true"
    SERVER_FORWARD_HEADERS_STRATEGY: framework

frontend:
  image:
    repository: trustledger-frontend
    tag: "2.9.0"
  replicaCount: 2
  containerPort: 3000
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# Secrets: in prod, set existingSecret to a Secret populated by External Secrets / AWS Secrets Manager.
# Never commit real secret values — `data` here is for local/dev only.
secret:
  existingSecret: ""        # e.g. "trustledger-secrets" managed externally
  data:
    JWT_SECRET: ""
    DATABASE_URL: ""
    DATABASE_USERNAME: ""
    DATABASE_PASSWORD: ""
    KAFKA_BOOTSTRAP_SERVERS: ""
    RAILS_WEBHOOK_SECRET: ""

ingress:
  enabled: true
  className: nginx
  host: trustledger.example.com
  tls:
    enabled: true
    secretName: trustledger-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"

podDisruptionBudget:
  enabled: true
  minAvailable: 1
