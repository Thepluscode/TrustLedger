apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trustledger.fullname" . }}-config
  labels:
    {{- include "trustledger.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.backend.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- if not .Values.secret.existingSecret }}
---
# Dev/local only. In prod, set secret.existingSecret to a Secret populated by an external
# secret manager (AWS Secrets Manager via External Secrets Operator) — see docs/SECRETS_MANAGEMENT.md.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trustledger.secretName" . }}
  labels:
    {{- include "trustledger.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
