              raise SystemExit('transaction import anchor did not match exactly once')
          text = text.replace(old, new, 1)

          old = '    private final ExternalRailSubmissionService submissions;\n    private final ObjectMapper json;'
          new = ('    private final ExternalRailSubmissionService submissions;\n'
                 '    private final ObjectMapper json;\n'
