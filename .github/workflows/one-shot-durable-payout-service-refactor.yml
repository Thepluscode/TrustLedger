name: One-shot durable payout service refactor

on:
  push:
    branches:
      - agent/durable-payout-submission

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Trigger durable payout service refactor')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/durable-payout-submission
          fetch-depth: 0
      - name: Split payout preparation and finalization transactions
        shell: bash
        run: |
          python - <<'PY'
