name: One-shot Paystack OTP state correction

on:
  push:
    branches:
      - agent/paystack-webhooks-otp

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Trigger one-shot Paystack OTP state correction')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/paystack-webhooks-otp
          fetch-depth: 0
      - name: Keep invalid OTP reserved for retry
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/src/main/java/com/trustledger/rails/paystack/PaystackPaymentRailAdapter.java')
          text = path.read_text()
          old = '''            String normalized = response.definitiveFailure() ? ExternalPaymentStatus.FAILED : normalize(response.status());
            if (ExternalPaymentStatus.SETTLED.equals(normalized)) normalized = ExternalPaymentStatus.PENDING_SETTLEMENT;
            String objectId = response.transferCode() == null ? request.providerObjectId() : response.transferCode();'''
          new = '''            String normalized = response.definitiveFailure()
                ? ExternalPaymentStatus.ACTION_REQUIRED : normalize(response.status());
            if (ExternalPaymentStatus.SETTLED.equals(normalized)) normalized = ExternalPaymentStatus.PENDING_SETTLEMENT;
            String objectId = response.transferCode() == null ? request.providerObjectId() : response.transferCode();'''
          if text.count(old) != 1:
              raise SystemExit('OTP state block did not match exactly once')
          path.write_text(text.replace(old, new, 1))

          test = Path('backend/src/test/java/com/trustledger/rails/paystack/PaystackWebhookOtpTest.java')
          text = test.read_text()
          anchor = '''        assertEquals("123456", request.getValue().otp());
    }
'''
          addition = '''        assertEquals("123456", request.getValue().otp());
    }

    @Test
    void invalidOtpResponseKeepsPayoutActionRequired() {
        UUID tenant = UUID.randomUUID();
        UUID configId = UUID.randomUUID();
        TenantProviderConfigRepository configs = mock(TenantProviderConfigRepository.class);
        when(configs.findByIdAndTenantId(configId, tenant)).thenReturn(Optional.of(config(tenant, configId, true)));
        PaystackApiClient api = mock(PaystackApiClient.class);
        when(api.finalizeTransfer(eq(SECRET), any())).thenReturn(new PaystackApiClient.PaystackResponse(
            null, "paystack_1234567890", "TRF_native", "Invalid OTP", 400, true));
        PaystackPaymentRailAdapter adapter = new PaystackPaymentRailAdapter(configs, ref -> SECRET, api,
            new ObjectMapper());

        PaymentRailAdapter.PaymentSubmitResult result = adapter.executeAction(
            new PaymentRailAdapter.PaymentActionRequest(tenant, UUID.randomUUID(), configId, "SANDBOX",
                "paystack_1234567890", "TRF_native", PaystackPaymentRailAdapter.OTP_FINALIZE, "000000"));

        assertEquals(ExternalPaymentStatus.ACTION_REQUIRED, result.status());
        assertEquals("TRF_native", result.providerObjectId());
    }
'''
          if text.count(anchor) != 1:
              raise SystemExit('OTP test insertion anchor did not match exactly once')
          test.write_text(text.replace(anchor, addition, 1))
          PY
          git config user.name "trustledger-control-plane-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/src/main/java/com/trustledger/rails/paystack/PaystackPaymentRailAdapter.java \
                  backend/src/test/java/com/trustledger/rails/paystack/PaystackWebhookOtpTest.java
          git commit -m "Keep invalid Paystack OTP action required"
          git push origin HEAD:agent/paystack-webhooks-otp
