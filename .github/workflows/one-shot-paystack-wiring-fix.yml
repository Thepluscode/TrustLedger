name: One-shot Paystack wiring fix

on:
  push:
    branches:
      - agent/paystack-payout-adapter

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Trigger one-shot Paystack wiring fix')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/paystack-payout-adapter
          fetch-depth: 0
      - name: Repair Spring constructor and fixture requests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          client = Path('backend/src/main/java/com/trustledger/rails/paystack/JdkPaystackApiClient.java')
          text = client.read_text()
          import_anchor = 'import java.util.Map;\nimport org.springframework.beans.factory.annotation.Value;'
          import_replacement = 'import java.util.Map;\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;'
          if text.count(import_anchor) != 1:
              raise SystemExit('Paystack client import anchor did not match exactly once')
          text = text.replace(import_anchor, import_replacement, 1)
          ctor_anchor = '    public JdkPaystackApiClient(ObjectMapper json,'
          ctor_replacement = '    @Autowired\n    public JdkPaystackApiClient(ObjectMapper json,'
          if text.count(ctor_anchor) != 1:
              raise SystemExit('Paystack client constructor anchor did not match exactly once')
          client.write_text(text.replace(ctor_anchor, ctor_replacement, 1))

          test = Path('backend/src/test/java/com/trustledger/rails/paystack/PaystackPaymentRailAdapterTest.java')
          text = test.read_text()
          old = 'fixture.adapter().initiatePayment(request())'
          count = text.count(old)
          if count != 3:
              raise SystemExit(f'expected three fixture request call sites, found {count}')
          test.write_text(text.replace(old, 'fixture.adapter().initiatePayment(fixture.request())'))
          PY
          git config user.name "trustledger-control-plane-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/src/main/java/com/trustledger/rails/paystack/JdkPaystackApiClient.java \
                  backend/src/test/java/com/trustledger/rails/paystack/PaystackPaymentRailAdapterTest.java
          git commit -m "Fix Paystack client wiring and fixtures"
          git push origin HEAD:agent/paystack-payout-adapter
