name: One-shot Paystack compile fix

on:
  push:
    branches:
      - agent/paystack-payout-adapter

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Trigger one-shot severity fix')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/paystack-payout-adapter
          fetch-depth: 0
      - name: Correct severity helper return type
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/src/main/java/com/trustledger/app/ExternalPaymentService.java')
          text = path.read_text()
          old = 'private static int severityFor(int score)'
          new = 'private static String severityFor(int score)'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one severity helper, found {count}')
          path.write_text(text.replace(old, new, 1))
          PY
          git config user.name "trustledger-control-plane-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/src/main/java/com/trustledger/app/ExternalPaymentService.java
          git commit -m "Fix payout severity helper return type"
          git push origin HEAD:agent/paystack-payout-adapter
