name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Maven + Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: mvn test
        working-directory: backend
        run: mvn -B -ntp test

  frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  infra-and-repo:
    name: Compose config + repo validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose -f infra/docker-compose.yml config -q
      - name: Repo validation
        run: python3 scripts/validate_repo.py
