name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"   # weekly

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the scan covers every commit
      # Pinned gitleaks binary instead of gitleaks-action@v2: the action's
      # ScanPullRequest path needs pull-requests-write GitHub API access and fails on
      # every PR ("Resource not accessible by integration"). The binary just scans —
      # no API call, no org-license gate, no Node-20 deprecation.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repository history
        run: gitleaks git . --no-banner --redact --exit-code 1

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: pip install semgrep==1.167.0   # pinned; OSS registry rulesets (no login)
      # Blocking: --error exits non-zero on any finding. Verified 0 findings at
      # introduction, so this gates regressions rather than the existing code.
      - name: Semgrep scan
        run: |
          semgrep scan --error --metrics off \
            --config p/java --config p/javascript \
            --config p/owasp-top-ten --config p/secrets \
            backend frontend

  dependency-scan:
    name: Dependency & filesystem scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          # Blocking on NEW HIGH/CRITICAL. The pre-existing backlog is baselined in
          # .trivyignore (cleared by the Spring Boot 4.0.6 bump, tracked separately).
          exit-code: "1"
          trivyignores: .trivyignore

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: trustledger.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: trustledger.cdx.json
