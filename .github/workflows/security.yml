name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"   # weekly

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency & filesystem scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          # Blocking. The backend (Spring Boot 4.0.7) and frontend both scan clean at 0
          # HIGH/CRITICAL, so this gates regressions rather than an existing backlog — no
          # suppressions are needed today. When a HIGH/CRITICAL has no fix yet, add a dated,
          # justified entry to .trivyignore rather than weakening this gate.
          exit-code: "1"
          trivyignores: .trivyignore

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: trustledger.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: trustledger.cdx.json
