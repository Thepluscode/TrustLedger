name: One-shot payout state fix

on:
  push:
    branches:
      - agent/paystack-payout-adapter

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Trigger one-shot payout state fix')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/paystack-payout-adapter
          fetch-depth: 0
      - name: Normalize submitted states and preserve business failures
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          submission = Path('backend/src/main/java/com/trustledger/app/ExternalRailSubmissionService.java')
          text = submission.read_text()
          old = '''            status = response.status();
            if (status == null || status.isBlank()) status = ExternalPaymentStatus.PENDING_UNKNOWN;
            attempt.setResponsePayload(write(Map.of("status", status)));'''
          new = '''            status = response.status();
            if (status == null || status.isBlank()) {
                status = ExternalPaymentStatus.PENDING_UNKNOWN;
            } else if (ExternalPaymentStatus.ACCEPTED.equals(status)
                    || ExternalPaymentStatus.SUBMITTED.equals(status)) {
                status = ExternalPaymentStatus.PENDING_SETTLEMENT;
            }
            attempt.setResponsePayload(write(Map.of("status", status)));'''
          if text.count(old) != 1:
              raise SystemExit('submission status block did not match exactly once')
          submission.write_text(text.replace(old, new, 1))

          replay = Path('backend/src/main/java/com/trustledger/app/ReplaySafeExternalPaymentService.java')
          text = replay.read_text()
          old = '''        try {
            return super.initiate(request, decision);
        } catch (RuntimeException executionFailure) {
            // A concurrent request may have completed between the pre-check and the base execution.
            replay = completedReplay(request);
            if (replay != null) return replay;
            throw executionFailure;
        }'''
          new = '''        return super.initiate(request, decision);'''
          if text.count(old) != 1:
              raise SystemExit('replay catch-all block did not match exactly once')
          replay.write_text(text.replace(old, new, 1))
          PY
          git config user.name "trustledger-control-plane-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/src/main/java/com/trustledger/app/ExternalRailSubmissionService.java \
                  backend/src/main/java/com/trustledger/app/ReplaySafeExternalPaymentService.java
          git commit -m "Normalize payout states and preserve execution failures"
          git push origin HEAD:agent/paystack-payout-adapter
