spring:
  application:
    name: trustledger-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/trustledger}
    username: ${DATABASE_USERNAME:trustledger}
    password: ${DATABASE_PASSWORD:trustledger}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 5000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness
      show-details: when_authorized

trustledger:
  fraud:
    mfa-threshold: 50
    hold-threshold: 65
    reject-threshold: 95
  ledger:
    allow-negative-balances: false
  outbox:
    topic: trustledger.events
    publisher:
      enabled: true
      interval-ms: 2000
